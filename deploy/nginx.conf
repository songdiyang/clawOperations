# ClawOperations Nginx 配置
# 服务器: 101.133.162.255
# 
# 使用方法:
# 1. 将此文件复制到 /etc/nginx/sites-available/clawoperations
# 2. 创建软链接: ln -s /etc/nginx/sites-available/clawoperations /etc/nginx/sites-enabled/
# 3. 测试配置: nginx -t
# 4. 重载配置: nginx -s reload

server {
    listen 80;
    server_name 101.133.162.255;

    # 前端静态文件
    root /var/www/clawoperations/client;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # 前端路由 - SPA 支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 上传文件大小限制 (视频上传需要)
        client_max_body_size 500M;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 抖音 OAuth 回调
    location /auth/callback {
        try_files $uri /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/clawoperations-access.log;
    error_log /var/log/nginx/clawoperations-error.log;
}
